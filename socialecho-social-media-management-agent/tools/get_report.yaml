identity:
  name: get_report
  author: socialecho-net
  label:
    en_US: Get Report
    zh_Hans: 数据报表
description:
  human:
    en_US: Query SocialEcho report metrics within a date range, with optional grouping.
    zh_Hans: 按起止日期查询数据报表，可选账号与分组维度；日期格式 YYYY-MM-DD。
  llm: >-
    Required start_date and end_date (YYYY-MM-DD). Optional CSV account_ids (int array in body), time_type, group.
    必填起止日期；account_ids 逗号分隔、API 为整型数组；可选 time_type 与 group。
parameters:
  - name: start_date
    type: string
    required: true
    label:
      en_US: Start Date
      zh_Hans: 开始日期
    human_description:
      en_US: Start date in YYYY-MM-DD format.
      zh_Hans: 开始日期，格式 YYYY-MM-DD。
    llm_description: YYYY-MM-DD, required. 开始日期，必填。
    form: llm
  - name: end_date
    type: string
    required: true
    label:
      en_US: End Date
      zh_Hans: 结束日期
    human_description:
      en_US: End date in YYYY-MM-DD format.
      zh_Hans: 结束日期，格式 YYYY-MM-DD。
    llm_description: YYYY-MM-DD, required. 结束日期，必填。
    form: llm
  - name: account_ids
    type: string
    required: false
    label:
      en_US: Account IDs (CSV)
      zh_Hans: 社媒账号 ID（逗号分隔）
    human_description:
      en_US: Comma-separated account IDs, for example 163956,163955,28.
      zh_Hans: 仅统计这些账号，英文逗号分隔；可留空。
    llm_description: CSV account_id list, optional. 逗号分隔的 account_id，可留空表示不过滤。
    form: llm
  - name: time_type
    type: number
    required: false
    label:
      en_US: Time Type
      zh_Hans: 时间范围类型
    human_description:
      en_US: 1 for posts created in range, 2 for all historical posts visible in range.
      zh_Hans: 1=日期内新发帖等；2=历史可见等（以线上为准）。
    llm_description: 1 or 2 per API docs. 一般为 1/2，含义见产品文档。
    form: llm
  - name: group
    type: string
    required: false
    label:
      en_US: Group By
      zh_Hans: 分组
    human_description:
      en_US: Group by day, app, account, or empty for totals.
      zh_Hans: 如 day、app、account 或空字符串为汇总。
    llm_description: day|app|account|empty. 分组维度，空为总量。
    form: llm
extra:
  python:
    source: tools/get_report.py
